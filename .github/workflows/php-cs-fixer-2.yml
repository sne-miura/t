name: PHP Code Style Check v2

on:
  push:
    # branches: [ main, develop ]
    paths:
      - '**/*.php'
      - '.php-cs-fixer.dist.php'
      - 'composer.json'
      - '.github/workflows/php-cs-fixer-2.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.php'
      - '.php-cs-fixer.dist.php'
      - 'composer.json'
      - '.github/workflows/php-cs-fixer-2.yml'

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: PHP-CS-Fixer
        uses: "docker://ghcr.io/php-cs-fixer/php-cs-fixer:3-php8.5"
        with:
          args: check
