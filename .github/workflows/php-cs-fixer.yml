name: PHP Code Style Check

on:
  push:
    # branches: [ main, develop ]
    paths:
      - '**/*.php'
      - '.php-cs-fixer.dist.php'
      - 'composer.json'
      - '.github/workflows/php-cs-fixer.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**/*.php'
      - '.php-cs-fixer.dist.php'
      - 'composer.json'
      - '.github/workflows/php-cs-fixer.yml'

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.5'
          extensions: curl, mbstring, zip
          coverage: none
      
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      
      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      
      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer check --diff --verbose > cs-fixer-output.txt 2>&1
      
      - name: Add summary
        run: |
          echo "## PHP CS Fixer Results" >> $GITHUB_STEP_SUMMARY
          cat cs-fixer-output.txt >> $GITHUB_STEP_SUMMARY
